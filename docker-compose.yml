services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: locationsbook
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: dev
    ports:
      - "9000:9000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/locationsbook
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-locationsbook-dev}
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: >
      celery -A app.core.celery_app:celery_app worker
      --loglevel=info
      --concurrency=2
      -Q locationsbook-default
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/locationsbook
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-locationsbook-dev}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
