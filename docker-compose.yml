services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: locationsbook
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/locationsbook
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
