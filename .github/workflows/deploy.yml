name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO: locationsbook/lb-backend
  ECS_CLUSTER: locationsbook-migrations
  ECS_TASK_FAMILY: locationsbook-migrate

permissions:
  id-token: write
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: locationsbook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    container:
      image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check app/ tests/

      - name: Ruff format
        run: uv run ruff format --check app/ tests/

      - name: Mypy
        run: uv run mypy app/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/locationsbook_test
          SECRET_KEY: test-secret-key
        run: uv run pytest -v

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}"
          docker build -t "${IMAGE_URI}:${IMAGE_TAG}" -t "${IMAGE_URI}:latest" .
          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"
          echo "IMAGE_URI=${IMAGE_URI}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Register migration task definition
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

          SUBNET_IDS='${{ secrets.PRIVATE_SUBNET_IDS }}'
          SG_ID='${{ secrets.APPRUNNER_SG_ID }}'

          # Register updated task definition with new image
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --family "$ECS_TASK_FAMILY" \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu "256" \
            --memory "512" \
            --execution-role-arn "${{ secrets.ECS_EXEC_ROLE_ARN }}" \
            --task-role-arn "${{ secrets.ECS_TASK_ROLE_ARN }}" \
            --container-definitions "[{
              \"name\": \"migrate\",
              \"image\": \"${IMAGE}\",
              \"essential\": true,
              \"command\": [\"alembic\", \"upgrade\", \"head\"],
              \"environment\": [
                {\"name\": \"DATABASE_URL\", \"value\": \"${{ secrets.DATABASE_URL }}\"},
                {\"name\": \"SECRET_KEY\", \"value\": \"${{ secrets.SECRET_KEY }}\"}
              ],
              \"logConfiguration\": {
                \"logDriver\": \"awslogs\",
                \"options\": {
                  \"awslogs-group\": \"/ecs/locationsbook-migrate\",
                  \"awslogs-region\": \"${AWS_REGION}\",
                  \"awslogs-stream-prefix\": \"migrate\"
                }
              }
            }]" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "TASK_DEF_ARN=${TASK_DEF_ARN}" >> "$GITHUB_ENV"
          echo "SUBNET_IDS=${SUBNET_IDS}" >> "$GITHUB_ENV"
          echo "SG_ID=${SG_ID}" >> "$GITHUB_ENV"

      - name: Run Alembic migration
        run: |
          # Parse subnet IDs (comma-separated)
          IFS=',' read -ra SUBNETS <<< "$SUBNET_IDS"
          SUBNET_JSON=$(printf '"%s",' "${SUBNETS[@]}" | sed 's/,$//')

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "{
              \"awsvpcConfiguration\": {
                \"subnets\": [${SUBNET_JSON}],
                \"securityGroups\": [\"${SG_ID}\"]
              }
            }" \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: ${TASK_ARN}"

          # Wait for task to complete
          echo "Waiting for migration to complete..."
          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code: ${EXIT_CODE}"

            # Fetch logs for debugging
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            aws logs get-log-events \
              --log-group-name "/ecs/locationsbook-migrate" \
              --log-stream-name "migrate/migrate/${TASK_ID}" \
              --query 'events[].message' --output text 2>/dev/null || true

            exit 1
          fi

          echo "Migration completed successfully."

      - name: Update App Runner service
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
            --source-configuration "{
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"${{ secrets.APPRUNNER_ACCESS_ROLE_ARN }}\"
              },
              \"ImageRepository\": {
                \"ImageIdentifier\": \"${IMAGE_URI}\",
                \"ImageRepositoryType\": \"ECR\",
                \"ImageConfiguration\": {
                  \"Port\": \"9000\",
                  \"RuntimeEnvironmentVariables\": {
                    \"DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\",
                    \"SECRET_KEY\": \"${{ secrets.SECRET_KEY }}\",
                    \"APP_ENV\": \"production\"
                  }
                }
              },
              \"AutoDeploymentsEnabled\": false
            }"

          echo "Waiting for App Runner deployment..."

      - name: Wait for deployment
        run: |
          SERVICE_ARN="${{ secrets.APPRUNNER_SERVICE_ARN }}"

          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query 'Service.Status' --output text)

            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment complete."
              break
            elif [ "$STATUS" = "OPERATION_IN_PROGRESS" ] || [ "$STATUS" = "CREATE_FAILED" ]; then
              if [ "$STATUS" = "CREATE_FAILED" ]; then
                echo "Deployment failed!"
                exit 1
              fi
              echo "Status: ${STATUS} (attempt ${i}/60)"
              sleep 10
            else
              echo "Unexpected status: ${STATUS}"
              sleep 10
            fi

            if [ "$i" -eq 60 ]; then
              echo "Deployment timed out after 10 minutes."
              exit 1
            fi
          done

      - name: Verify health check
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
            --query 'Service.ServiceUrl' --output text)

          RESPONSE=$(curl -sf "https://${SERVICE_URL}/api/v1/health" || true)
          echo "Health check response: ${RESPONSE}"

          if echo "$RESPONSE" | grep -q '"status":"healthy"'; then
            echo "Health check passed."
          else
            echo "Health check failed!"
            exit 1
          fi
